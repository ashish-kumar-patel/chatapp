<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-header">
      <div class="logo">💬</div>
      <h1>Welcome Back</h1>
      <p>Sign in to continue chatting</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Email</label>
        <input
          type="email"
          formControlName="email"
          placeholder="you@example.com"
          [class.error]="form.get('email')?.invalid && form.get('email')?.touched"
        />
        <span class="error-msg" *ngIf="form.get('email')?.invalid && form.get('email')?.touched">
          Enter a valid email address
        </span>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input
          type="password"
          formControlName="password"
          placeholder="••••••••"
          [class.error]="form.get('password')?.invalid && form.get('password')?.touched"
        />
        <span class="error-msg" *ngIf="form.get('password')?.invalid && form.get('password')?.touched">
          Minimum 6 characters
        </span>
      </div>

      <div class="alert-error" *ngIf="error">{{ error }}</div>

      <button type="submit" [disabled]="form.invalid || loading" class="btn-primary">
        <span *ngIf="loading">Signing in...</span>
        <span *ngIf="!loading">Sign In</span>
      </button>
    </form>

    <p class="auth-footer">
      Don't have an account? <a routerLink="/register">Sign up</a>
    </p>
  </div>
</div>
