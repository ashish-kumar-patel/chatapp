<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-header">
      <div class="logo">💬</div>
      <h1>Create Account</h1>
      <p>Join the conversation today</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Username</label>
        <input type="text" formControlName="username" placeholder="cooluser123"
          [class.error]="form.get('username')?.invalid && form.get('username')?.touched" />
        <span class="error-msg" *ngIf="form.get('username')?.invalid && form.get('username')?.touched">
          3–20 characters required
        </span>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" formControlName="email" placeholder="you@example.com"
          [class.error]="form.get('email')?.invalid && form.get('email')?.touched" />
        <span class="error-msg" *ngIf="form.get('email')?.invalid && form.get('email')?.touched">
          Enter a valid email
        </span>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" formControlName="password" placeholder="••••••••"
          [class.error]="form.get('password')?.invalid && form.get('password')?.touched" />
        <span class="error-msg" *ngIf="form.get('password')?.invalid && form.get('password')?.touched">
          Minimum 6 characters
        </span>
      </div>

      <div class="alert-error" *ngIf="error">{{ error }}</div>

      <button type="submit" [disabled]="form.invalid || loading" class="btn-primary">
        <span *ngIf="loading">Creating account...</span>
        <span *ngIf="!loading">Create Account</span>
      </button>
    </form>

    <p class="auth-footer">
      Already have an account? <a routerLink="/login">Sign in</a>
    </p>
  </div>
</div>
